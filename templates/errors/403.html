{% extends "base.html" %}
{% block title %}403 — Access Denied{% endblock %}
{% block content %}
<div class="error-page">
    <h1>403</h1>
    <h2>Access Denied</h2>
    <p>You do not have permission to access this page.</p>
    {% if current_user.is_authenticated %}
        <a href="{{ url_for('auth.dashboard') }}" class="btn btn-primary">Go to Dashboard</a>
    {% else %}
        <a href="{{ url_for('property.index') }}" class="btn btn-primary">Go Home</a>
    {% endif %}
</div>
{% endblock %}
