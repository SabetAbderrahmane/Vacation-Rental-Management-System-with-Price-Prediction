{% extends "base.html" %}
{% block title %}Add Property{% endblock %}
{% block content %}
<div class="form-card host-form-card">
    <h1>Add New Property</h1>

    <form method="POST" action="{{ url_for('host.add_property') }}">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required minlength="3" maxlength="150"
                   placeholder="e.g. Modern Apartment in City Center">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Describe your property..."></textarea>
        </div>

        <div class="form-group">
            <label for="location">Location *</label>
            <input type="text" id="location" name="location" required minlength="2" maxlength="150"
                   placeholder="e.g. Paris, France">
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" placeholder="Full street address (optional)">
        </div>

        <div class="form-group">
            <label for="room_type">Room Type *</label>
            <select id="room_type" name="room_type" required>
                <option value="" disabled selected>Select room type</option>
                <option value="entire_home">Entire Home</option>
                <option value="private_room">Private Room</option>
                <option value="shared_room">Shared Room</option>
                <option value="hotel_room">Hotel Room</option>
            </select>
        </div>

        <div class="form-grid-3">
            <div class="form-group">
                <label for="bedrooms">Bedrooms *</label>
                <input type="number" id="bedrooms" name="bedrooms" value="1" min="0" required>
            </div>
            <div class="form-group">
                <label for="bathrooms">Bathrooms *</label>
                <input type="number" id="bathrooms" name="bathrooms" value="1" min="0" step="0.5" required>
            </div>
            <div class="form-group">
                <label for="max_guests">Max Guests *</label>
                <input type="number" id="max_guests" name="max_guests" value="1" min="1" required>
            </div>
        </div>

        <div class="form-group">
            <label for="amenities">Amenities</label>
            <input type="text" id="amenities" name="amenities"
                   placeholder="e.g. wifi,kitchen,parking,pool">
        </div>

        <div class="form-grid-2">
            <div class="form-group">
                <label for="price_per_night">Price per Night ($) *</label>
                <input type="number" id="price_per_night" name="price_per_night" min="0.01" step="0.01" required
                       placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="availability_status">Availability *</label>
                <select id="availability_status" name="availability_status" required>
                    <option value="available" selected>Available</option>
                    <option value="unavailable">Unavailable</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="image_url">Image Path or URL</label>
            <input type="text" id="image_url" name="image_url" placeholder="images/properties/nyc_brooklyn_apartment.jpg">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Property</button>
            <a href="{{ url_for('host.properties') }}" class="btn btn-secondary btn-gap-left">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
