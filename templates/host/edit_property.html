{% extends "base.html" %}
{% block title %}Edit Property{% endblock %}
{% block content %}
<div class="form-card host-form-card">
    <h1>Edit Property</h1>

    <form method="POST" action="{{ url_for('host.edit_property', property_id=property.id) }}">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required minlength="3" maxlength="150"
                   value="{{ property.title }}">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ property.description or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="location">Location *</label>
            <input type="text" id="location" name="location" required minlength="2" maxlength="150"
                   value="{{ property.location }}">
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" value="{{ property.address or '' }}">
        </div>

        <div class="form-group">
            <label for="room_type">Room Type *</label>
            <select id="room_type" name="room_type" required>
                <option value="entire_home" {% if property.room_type == 'entire_home' %}selected{% endif %}>Entire Home</option>
                <option value="private_room" {% if property.room_type == 'private_room' %}selected{% endif %}>Private Room</option>
                <option value="shared_room" {% if property.room_type == 'shared_room' %}selected{% endif %}>Shared Room</option>
                <option value="hotel_room" {% if property.room_type == 'hotel_room' %}selected{% endif %}>Hotel Room</option>
            </select>
        </div>

        <div class="form-grid-3">
            <div class="form-group">
                <label for="bedrooms">Bedrooms *</label>
                <input type="number" id="bedrooms" name="bedrooms" value="{{ property.bedrooms }}" min="0" required>
            </div>
            <div class="form-group">
                <label for="bathrooms">Bathrooms *</label>
                <input type="number" id="bathrooms" name="bathrooms" value="{{ property.bathrooms }}" min="0" step="0.5" required>
            </div>
            <div class="form-group">
                <label for="max_guests">Max Guests *</label>
                <input type="number" id="max_guests" name="max_guests" value="{{ property.max_guests }}" min="1" required>
            </div>
        </div>

        <div class="form-group">
            <label for="amenities">Amenities</label>
            <input type="text" id="amenities" name="amenities" value="{{ property.amenities or '' }}">
        </div>

        <div class="form-grid-2">
            <div class="form-group">
                <label for="price_per_night">Price per Night ($) *</label>
                <input type="number" id="price_per_night" name="price_per_night"
                       value="{{ property.price_per_night }}" min="0.01" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="availability_status">Availability *</label>
                <select id="availability_status" name="availability_status" required>
                    <option value="available" {% if property.availability_status == 'available' %}selected{% endif %}>Available</option>
                    <option value="unavailable" {% if property.availability_status == 'unavailable' %}selected{% endif %}>Unavailable</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="image_url">Image Path or URL</label>
            <input type="text" id="image_url" name="image_url" value="{{ property.image_url or '' }}" placeholder="images/properties/nyc_brooklyn_apartment.jpg">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Property</button>
            <a href="{{ url_for('host.properties') }}" class="btn btn-secondary btn-gap-left">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
