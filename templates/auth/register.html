{% extends "base.html" %}
{% block title %}Register — Vacation Rental System{% endblock %}
{% block content %}
<div class="form-card">
    <h1>Create Account</h1>
    <p class="text-muted mb-2">Register as a Host or Customer to get started.</p>

    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required minlength="2" maxlength="120"
                   placeholder="Your full name">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required
                   placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6"
                   placeholder="Minimum 6 characters">
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required
                   placeholder="Re-enter your password">
        </div>

        <div class="form-group">
            <label for="role">Register as</label>
            <select id="role" name="role" required>
                <option value="" disabled selected>Select role</option>
                <option value="host">Host</option>
                <option value="customer">Customer</option>
            </select>
        </div>

        <div class="form-group">
            <label for="phone_number">Phone Number <span class="text-muted">(optional)</span></label>
            <input type="text" id="phone_number" name="phone_number"
                   placeholder="Optional">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary" style="width:100%">Register</button>
        </div>
    </form>

    <p class="text-center mt-2">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
